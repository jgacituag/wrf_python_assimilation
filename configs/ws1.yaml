# configs/ws1.yaml
# ================
# WS-1: single observation, Ntemp sensitivity sweep.
#
# Scientific question: how many tempering iterations are needed before
# performance saturates? Compare AOEI vs TEnKF for Ntemp=1,2,3.
#
# Usage:
#   python src/runners/run_experiment.py --config configs/ws1.yaml --tm 0
#   python src/runners/run_experiment.py --config configs/ws1.yaml --tm 0 --verbose 3

experiment_tag: WS1_sweep
verbose: 1
skip_existing: false

paths:
  prepared: /home/jorge.gacitua/salidas/WRF_Single_Cycle_Assimilation/data/3D_subsets_20240319_DAFCST_20240319180000/subset_20240320180000.npz
  outdir:   /home/jorge.gacitua/salidas/WRF_Single_Cycle_Assimilation/data/WS1_sweep/

state:
  n_members: 60
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}
 
obs:
  obs_error_var: 5.0    # variance [dBZ^2]  (sigma ~2.2 dBZ)
 
qc:
  filter_ensemble: true
  filter_truth:    false
  filter_mode:     and
  dbz_min:         5.0
 
sweep:
  truth_members: 0
  prior_size:    60
 
  obs_points:
    mode: sweep
 
  stride: 5   # ~130k pts for timing test -- remove for full run
 
  methods:  [TEnKF, AOEI]
  ntemp:    [1, 2, 3]
  alpha_s:  2.0
 
  # Localization in km.
  # Old ws1 used 5 grid pts horizontal (~10 km at 2 km/pt)
  # and 1 grid pt vertical. Your z levels: 0.25,0.5,1,2,3,4,5,6,8,10,12 km.
  # z=5 is at index 5 (altitude=5 km). 2 km radius covers levels 3-6 km.
  loc_x:  10.0   # [km]
  loc_y:  10.0   # [km]
  loc_z:   2.0   # [km]  covers ~2 levels above and below obs at z=5
 
cutoff_factor: 4.0
store_fields:  false
 